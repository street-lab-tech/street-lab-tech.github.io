<footer id="footer" class="site-footer" role="contentinfo">
  <div class="container-fluid sl-container">
    <div class="row align-items-center gy-4">
      <div class="col-12 col-md-6 text-center text-md-start">
        <p class="mb-0">
          <strong>Contact:</strong><br>
          STREET Lab, KMDI,<br>
          Robarts Building, 7th Floor<br>
          130 St. George Street, Room 713<br>
          Toronto, Canada<br>
          (<a href="https://goo.gl/maps/VdwvvgXmk8qbtmBG9">Maps</a>)
        </p>
      </div>

      <div class="col-12 col-md-6 text-center">
        <img class="site-footer-logo img-fluid" src="{{ '/images/logo_final.png' | relative_url }}" alt="The STREET Lab logo. The globe, the symbol for resistor, and the symbol for grounding.">
        <p class="mb-0">
          &copy; <span id="year"></span> STREET Lab.<br>
          Site made with <a href="https://jekyllrb.com">Jekyll</a>
        </p>
      </div>
    </div>
  </div>
</footer>

{% assign bs = site.data.ui.bootstrap %}
<script src="{{ bs.js_url }}" integrity="{{ bs.js_integrity }}" crossorigin="anonymous"></script>
<script>
  (function () {
    var y = document.getElementById('year');
    if (y) y.textContent = new Date().getFullYear();

    document.querySelectorAll('.sl-email').forEach(function (el) {
      var addr = el.dataset.u + '@' + el.dataset.d;
      var a = document.createElement('a');
      a.href = 'mailto:' + addr;
      a.textContent = addr;
      el.parentNode.replaceChild(a, el);
    });
  })();
</script>
