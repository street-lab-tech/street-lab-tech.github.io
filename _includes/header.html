{% assign current = page.url | replace:'index.html','' %}
<nav class="navbar navbar-expand-md fixed-top sl-navbar" data-bs-theme="dark" aria-label="Primary navigation">
  <div class="container-fluid sl-container">
    <a class="navbar-brand sl-navbar-brand" href="{{ '/' | relative_url }}">STREET Lab @ University of Toronto</a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbar-collapse-1"
            aria-controls="navbar-collapse-1"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbar-collapse-1">
      <ul class="navbar-nav ms-auto mb-2 mb-md-0">
        <li class="nav-item"><a class="nav-link{% if current == '/' %} active{% endif %}" {% if current == '/' %}aria-current="page"{% endif %} href="{{ '/' | relative_url }}">Home</a></li>
        <li class="nav-item"><a class="nav-link{% if current == '/team/' %} active{% endif %}" {% if current == '/team/' %}aria-current="page"{% endif %} href="{{ '/team/' | relative_url }}">Team</a></li>
        <li class="nav-item"><a class="nav-link{% if current == '/publications/' %} active{% endif %}" {% if current == '/publications/' %}aria-current="page"{% endif %} href="{{ '/publications/' | relative_url }}">Publications</a></li>
        <li class="nav-item"><a class="nav-link{% if current == '/research/' or current contains '/research/' %} active{% endif %}" {% if current == '/research/' or current contains '/research/' %}aria-current="page"{% endif %} href="{{ '/research/' | relative_url }}">Research</a></li>
        <li class="nav-item"><a class="nav-link{% if current == '/resources/' %} active{% endif %}" {% if current == '/resources/' %}aria-current="page"{% endif %} href="{{ '/resources/' | relative_url }}">Resources</a></li>
        <li class="nav-item"><a class="nav-link{% if current == '/events.html' %} active{% endif %}" {% if current == '/events.html' %}aria-current="page"{% endif %} href="{{ '/events.html' | relative_url }}">Events</a></li>
      </ul>
    </div>
  </div>
</nav>
