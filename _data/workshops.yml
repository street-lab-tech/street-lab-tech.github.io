- title: "Conducting Research in Oppressive Settings"
  description: As justice-related research faces increasing transnational and domestic repression, researchers working on topics such as reproductive justice, LGBTQ2SIA+ equity, decolonization, climate justice, and social movements face increasing constraints and risks. Although the CSCW community has increasingly advocated for research in these domains, the current political climate exacerbates the precarity experienced by scholars engaged in this work. Institutional mechanisms such as ethics approvals frequently fail to address researchers' safety concerns, particularly those from marginalized communities themselves. Collaborators within the same project experience varying levels of risk based on location, career stage, and identity. This Special Interest Group (SIG) will facilitate dialogue on practical strategies for conducting research in oppressive contexts, drawing on the expertise of researchers who have developed survival and safety tactics. The discussions will address data storage practices, visibility considerations, transnational collaboration strategies, and psychological safety mechanisms. Our goal is to establish a collaboratively curated resource collection that supports researchers as they navigate oppressions in their collaborations, recognizing that these threats continue to grow in scale and intensity.
