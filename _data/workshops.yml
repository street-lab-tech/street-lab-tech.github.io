- title: "Organizing for More Just and Inclusive Futures: A Community Discussion"
  description: This Special Interest Group brings together researchers and practitioners to examine the critical questions, innovative methods and emerging possibilities that arise from an orientation toward disability justice within CSCW research particularly and HCI research more broadly. We will focus on how digital technologies influence the ways disabled people organize and advocate for their rights, and how disabled people influence and configure technologies as well. By attending to the intersections of technology, disability justice, and social movements, we aim to explore how HCI and CSCW research can support the organizing efforts of disabled communities. This SIG emphasizes the ways in which disabled people and communities have been organizing and are continuing to organize in response to various forms of oppression. The SIG will provide a platform for scholars and activists to engage in conversations around technologies, disability justice, and social movements. By centering disability justice as a framework, we hope to foster a deeper understanding of how HCI and CSCW research can support and amplify the efforts of disabled communities. Participants will share their insights, collaborate on research ideas, and contribute to a collective vision of a more inclusive and justice-oriented HCI and CSCW. Through these discussions, we aim to generate actionable strategies for future research and practice in supporting organizing efforts.
