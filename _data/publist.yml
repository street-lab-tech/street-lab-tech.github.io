- title: "Resilience to Disruption: Accessible Navigation for People with Visual Impairment"
  description: "People with visual impairments (PwVI) increasingly rely on digital navigation tools to travel independently, yet these tools misalign with the lived realities of navigating unpredictable urban environments, especially during severe weather events. Drawing on a journey mapping workshop, we explore how PwVI combine mobile apps, Orientation and Mobility (O&M) training, and human assistance to build flexible routines that adapt to recurrent disruptions, and prioritize predictability, safety, and confidence over speed. We argue that digital navigation technologies should support resilience through considering interoperability and designing for routine breakdown and multiple temporalities. We further articulate critical design considerations to better align accessible navigation with the everyday practices of PwVI."
