- title: "Tooling Justice: Articulating Equity Work Through Design Toolkits"
  description: "Design equity toolkits are increasingly being invoked to address the ethical and political consequences of technology design, yet they are criticized for being either too generic or too narrow to address the complex realities of equity in design. To examine the intended purpose of these toolkits from creators' perspectives and explore how designers envision using them in practice, we conducted a two-phase study: interviews with toolkit creators and a walkthrough demonstration workshop with early-career UX designers. Our findings highlight divergent values around toolkit functionality: while creators emphasize flexibility and reflection, early-career designers express a need for actionable pathways to help mediate design equity work within corporate hierarchies. We show how toolkits act as supports for articulation work in design equity, their role as boundary objects for values translation, and conclude by framing how design equity toolkits can be re-conceptualized as legitimacy building artefacts with capacities to help early-designers advocate for more equitable futures."
