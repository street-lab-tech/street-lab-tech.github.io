- title: "Infrastructuring as Collective Resistance: How Disabled Students Negotiate Access Using Digital Technologies at Universities"
  description: "Universities in North America often frame accessibility as an individual responsibility, emphasizing individualized accommodations for disabled students. However, these systems do not always align with students' access needs, leaving them to take on additional labour. At a Canadian university, we interviewed 13 student activists and leaders of disability-related groups. We investigate how disabled students collectively address access frictions that emerge from institutional infrastructure; adopting community practices that work with, within, and around the university to address gaps. Using the concept of 'routine infrastructuring', we demonstrate how student groups leverage technologies to mobilize and negotiate access needs through informal and formal practices as collective care infrastructure. We introduce the concept of 'counteractive frictions', which are produced collectively to disrupt and provoke negotiation with institutions. We call for scholars and designers to rethink 'infrastructuring' as adapting and maintaining, which masks the politics and generative potentialities of friction to reimagine disability futures."
