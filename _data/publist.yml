- title: "Socially-distant fasting: Information practices of young Muslims during the COVID-19 pandemic"
  description: "The COVID-19 pandemic has forced people to reimagine how they engage in spiritual and religious activities. This paper presents an analysis of the information practices of young Muslims during Ramadan, with a focus on their social, spiritual, and COVID-related needs and strategies."
